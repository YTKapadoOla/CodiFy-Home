<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao CodiFy v1.1 Alpha</title>
    <link rel="icon" href="Vintage Colorful Retro Vibes Typographic Product Brand Logo (6).png" type="image/png">
    <style>
        :root {
            --bg: #1e1e1e;
            --accent: #0e639c;
            --accent-hover: #1177bb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
        }

        .welcome-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1e1e 0%, #0e639c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-area {
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            letter-spacing: -1px;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #d1d1d1;
            max-width: 600px;
            margin: 15px 0 40px 0;
            line-height: 1.6;
        }

        .btn-start {
            background: white;
            color: var(--accent);
            border: none;
            padding: clamp(12px, 3vw, 18px) clamp(30px, 8vw, 50px);
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .btn-start:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            background: #f8f8f8;
        }

        .btn-start:active {
            transform: translateY(0) scale(0.98);
        }

        .footer-info {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajuste para notebooks fracos (remove desfoques pesados se houvesse) */
        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <div class="logo-area">
            <h1>CF v1.1 Alpha</h1>
            <p>Your new favorite programming language, as simple as Python, as powerful as JavaScript.</p>
        </div>

        <!-- Altere o href para o nome do seu arquivo principal da IDE -->
        <a href="https://ytkapadoola.github.io/CodiFy/" class="btn-start">Boot CodiFy</a>

        <div class="footer-info">
            POWERED BY JSCF ENGINE
        </div>
    </div>

</body>
</html>
